<!-- VOICE -->
<div id="page-voice" class="voice-page" style="display:none;">
  <div class="page-header">
    <h2 class="page-title">🎤 الصوت والتحويل</h2>
    <p class="page-subtitle">نص لصوت + شيلات + إعلانات + تفريغ صوتي</p>
  </div>

  <!-- Tabs -->
  <div class="collab-toggle" style="margin-bottom:20px;">
    <div class="collab-option active" onclick="Voice.switchTab('tts',this)">🔊 TTS</div>
    <div class="collab-option" onclick="Voice.switchTab('lyrics',this)">🎵 شيلات</div>
    <div class="collab-option" onclick="Voice.switchTab('commercial',this)">📢 إعلانات</div>
    <div class="collab-option" onclick="Voice.switchTab('stt',this)">🎙️ تفريغ</div>
  </div>

  <!-- TTS Tab -->
  <div id="voice-tab-tts">
    <div class="tts-card">
      <div class="form-group" style="margin-bottom:12px;">
        <textarea id="tts-text" class="input" rows="4"
          placeholder="اكتب النص..."></textarea>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">
        <div class="form-group" style="flex:1;min-width:140px;">
          <label class="form-label">الصوت</label>
          <select id="tts-voice" class="input" style="padding:10px 12px;">
            <option value="arabic_male">عربي رجالي</option>
            <option value="arabic_female">عربي نسائي</option>
            <option value="english_male">إنجليزي رجالي</option>
            <option value="english_female">إنجليزي نسائي</option>
            <option value="arabic_news">إخباري رسمي</option>
            <option value="arabic_calm">هادئ ومريح</option>
            <option value="commercial">تجاري</option>
          </select>
        </div>
        <div class="form-group" style="flex:1;min-width:140px;">
          <label class="form-label">الأسلوب</label>
          <select id="tts-style" class="input" style="padding:10px 12px;">
            <option value="normal">عادي</option>
            <option value="news">إخباري</option>
            <option value="calm">هادئ</option>
            <option value="commercial">تجاري</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="Voice.tts()" id="tts-btn">
          <span>توليد الصوت</span><span>🔊</span>
        </button>
      </div>
      <audio id="tts-audio" class="audio-player" controls style="display:none;"></audio>
    </div>
  </div>

  <!-- Lyrics Tab -->
  <div id="voice-tab-lyrics" style="display:none;">
    <div class="tts-card">
      <div class="form-group" style="margin-bottom:12px;">
        <label class="form-label">الموضوع</label>
        <input id="lyrics-theme" class="input" placeholder="مثال: الوطن والانتماء، الأم، الصداقة..." />
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">
        <div class="form-group" style="flex:1;min-width:140px;">
          <label class="form-label">النوع</label>
          <select id="lyrics-style" class="input" style="padding:10px 12px;">
            <option value="sheilah">شيلة سعودية</option>
            <option value="nasheed">نشيد بدون موسيقى</option>
            <option value="poem">قصيدة نبطية</option>
            <option value="song_ar">أغنية عربية</option>
          </select>
        </div>
        <div class="form-group" style="flex:1;min-width:140px;">
          <label class="form-label">الصوت</label>
          <select id="lyrics-voice" class="input" style="padding:10px 12px;">
            <option value="arabic_male">رجالي</option>
            <option value="arabic_female">نسائي</option>
            <option value="arabic_calm">هادئ</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="Voice.generateLyrics()" id="lyrics-btn">
          <span>توليد</span><span>🎵</span>
        </button>
      </div>
      <div id="lyrics-result" style="display:none;margin-top:16px;">
        <div id="lyrics-text" class="analysis-result"></div>
        <audio id="lyrics-audio" class="audio-player" controls style="display:none;margin-top:12px;"></audio>
      </div>
    </div>
  </div>

  <!-- Commercial Tab -->
  <div id="voice-tab-commercial" style="display:none;">
    <div class="tts-card">
      <div class="form-group" style="margin-bottom:12px;">
        <label class="form-label">المنتج أو الخدمة</label>
        <input id="commercial-product" class="input"
          placeholder="مثال: مطعم برغر الرياض، عطر ليلى، تطبيق دحمي..." />
      </div>
      <div style="display:flex;gap:12px;align-items:flex-end;">
        <div class="form-group" style="flex:1;">
          <label class="form-label">المدة</label>
          <select id="commercial-duration" class="input" style="padding:10px 12px;">
            <option value="15">15 ثانية</option>
            <option value="30" selected>30 ثانية</option>
            <option value="60">دقيقة</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="Voice.generateCommercial()" id="commercial-btn">
          <span>توليد الإعلان</span><span>📢</span>
        </button>
      </div>
      <div id="commercial-script" class="analysis-result" style="display:none;margin-top:16px;"></div>
      <audio id="commercial-audio" class="audio-player" controls style="display:none;margin-top:12px;"></audio>
    </div>
  </div>

  <!-- STT Tab -->
  <div id="voice-tab-stt" style="display:none;">
    <div class="voice-recorder">
      <h3 style="font-size:1rem;">🎙️ تفريغ الصوت إلى نص</h3>
      <button class="record-btn" id="record-btn" onclick="Voice.toggleRecord()">🎤</button>
      <p id="record-status" style="color:var(--text-muted);font-size:0.9rem;">اضغط للتسجيل</p>
      <div id="transcription-result" class="analysis-result" style="display:none;width:100%;"></div>
    </div>
  </div>
</div>
