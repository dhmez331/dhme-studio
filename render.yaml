services:
  - type: web
    name: dhme-studio-api
    runtime: python
    rootDir: backend
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: APP_SECRET
        value: dhme_studio_secret_2026
      - key: ADMIN_INVITE_CODE
        value: dhme_admin_2026